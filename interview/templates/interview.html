<!DOCTYPE html>
<html>
<head>
    <title>Interview</title>
</head>
<body>

    <h2>Role: {{ role }}</h2>

    <h3>Question:</h3>
    <p>{{ question }}</p>

    <form method="POST" action="/submit/">
        {% csrf_token %}
        
        <textarea name="answer" rows="5" cols="50"></textarea>
        <br><br>

        <button type="submit">Submit Answer</button>
    </form>

</body>
</html>
